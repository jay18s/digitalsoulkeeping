<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Received — Digital Soulkeeping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #060d1f;
      --aurora-teal: #4ff8c0;
      --text-primary: #ddeaf8;
      --text-muted: #7a95bb;
      --text-soft: #aac3df;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--void);
      color: var(--text-primary);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .hero-glyph {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      font-weight: 300;
      color: transparent;
      -webkit-text-stroke: 1px rgba(79,248,192,0.2);
      margin-bottom: 2rem;
      animation: fade-in 2s ease forwards;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    p {
      font-size: 1.1rem;
      color: var(--text-soft);
      max-width: 400px;
      margin-bottom: 3rem;
      line-height: 1.8;
    }
    p em {
      font-style: italic;
      color: var(--text-muted);
    }
    .back-btn {
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--aurora-teal);
      border-bottom: 1px solid rgba(79,248,192,0.25);
      padding-bottom: 0.5rem;
      transition: color 0.3s, border-color 0.3s;
    }
    .back-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-primary);
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hero-glyph">∞</div>
  <h1>Received.</h1>
  <p>Your words have arrived safely.<br><em>I will read them and respond within 48 hours.</em></p>
  <a href="/" class="back-btn">Return to the Sanctuary</a>
</body>
</html>
